<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#161828" />
  <title>CloudSpace · 网站演示动画参考</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #f2d8e2;
      --pink: #e87fa0;
      --cyan: #7ad4e8;
      --rose: #c9647e;
      --dim: rgba(242, 216, 226, 0.42);
      --font: "Space Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI",
        "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #161828; color: var(--ink);
      font-family: var(--font); -webkit-font-smoothing: antialiased;
      user-select: none; cursor: default;
    }
    #stage { position: fixed; inset: 0; display: block; z-index: 1; }

    /* film grain */
    .grain {
      position: fixed; inset: 0; pointer-events: none; z-index: 60; opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }

    /* corner badge */
    .badge {
      position: fixed; top: 24px; left: 28px; z-index: 40;
      display: flex; align-items: center; gap: 9px;
      opacity: 0; transition: opacity 1s ease;
    }
    .badge.show { opacity: 1; }
    .badge .dot {
      width: 5px; height: 5px; border-radius: 50%; background: var(--pink);
      animation: dotPulse 2s ease-in-out infinite;
    }
    .badge .txt {
      font-size: 9px; font-weight: 500; letter-spacing: 0.28em;
      text-transform: uppercase; color: rgba(242, 216, 226, 0.5);
    }
    .badge .sub { color: rgba(242, 216, 226, 0.3); }

    /* bottom hint */
    .hint {
      position: fixed; left: 0; right: 0; bottom: 30px; z-index: 40;
      text-align: center; font-size: 9.5px; font-weight: 400;
      letter-spacing: 0.34em; text-transform: uppercase;
      color: rgba(242, 216, 226, 0.34); pointer-events: none;
      opacity: 0; transition: opacity 1.2s ease;
    }
    .hint.show { opacity: 1; }
    .hint .k {
      display: inline-block; width: 4px; height: 4px; border-radius: 50%;
      background: var(--cyan); margin-right: 9px; vertical-align: middle;
      animation: blink 1.7s ease-in-out infinite;
    }

    /* access-key glass panel, anchored near the eye */
    .gate {
      position: fixed; z-index: 50; left: 50%; top: 50%;
      transform: translate(-50%, -50%) scale(0.94);
      width: min(330px, 86vw); padding: 22px 24px 20px;
      background: rgba(14, 10, 28, 0.62);
      backdrop-filter: blur(26px) saturate(150%);
      -webkit-backdrop-filter: blur(26px) saturate(150%);
      border: 1px solid rgba(232, 127, 160, 0.24); border-radius: 8px;
      box-shadow: inset 0 1px 0 rgba(255, 210, 230, 0.07), 0 18px 60px rgba(0, 0, 0, 0.5),
        0 0 70px rgba(232, 127, 160, 0.08);
      display: none; flex-direction: column; align-items: center; gap: 14px;
      opacity: 0;
    }
    .gate.open { display: flex; animation: panelIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    .gate.shake { animation: shake 0.5s both; }
    .gate-label {
      font-size: 8px; font-weight: 600; letter-spacing: 0.38em;
      text-transform: uppercase; color: rgba(232, 127, 160, 0.62);
    }
    .gate form { display: flex; align-items: center; gap: 11px; }
    .gate input {
      width: 168px; padding: 9px 14px; text-align: center;
      background: rgba(255, 255, 255, 0.04); border: none;
      border-bottom: 1.5px solid rgba(232, 127, 160, 0.3);
      color: var(--ink); font-family: var(--font); font-size: 14px;
      letter-spacing: 0.28em; caret-color: var(--pink); outline: none;
      transition: border-color 0.2s;
    }
    .gate input::placeholder { color: rgba(242, 216, 226, 0.3); letter-spacing: 0.2em; }
    .gate input:focus { border-bottom-color: rgba(232, 127, 160, 0.85); }
    .gate .key {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; flex-shrink: 0; background: transparent;
      border: 1px solid rgba(232, 127, 160, 0.3); border-radius: 50%;
      cursor: pointer; transition: background 0.2s, border-color 0.2s;
    }
    .gate .key:hover { background: rgba(232, 127, 160, 0.12); border-color: rgba(232, 127, 160, 0.7); }
    .gate-err {
      min-height: 11px; font-size: 8px; letter-spacing: 0.24em;
      text-transform: uppercase; color: rgba(220, 100, 110, 0.85);
    }
    .gate-ok .gate-err { color: rgba(140, 224, 168, 0.9); }

    @keyframes panelIn { from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
    @keyframes dotPulse { 0%, 100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.3); } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.15; } }
    @keyframes shake { 0%, 100% { transform: translate(-50%, -50%); } 20% { transform: translate(calc(-50% - 7px), -50%); } 40% { transform: translate(calc(-50% + 7px), -50%); } 60% { transform: translate(calc(-50% - 4px), -50%); } 80% { transform: translate(calc(-50% + 4px), -50%); } }

    @media (prefers-reduced-motion: reduce) {
      .badge .dot, .hint .k { animation: none; }
    }
  </style>
</head>
<body>
  <canvas id="stage"></canvas>
  <div class="grain" aria-hidden="true"></div>

  <div class="badge" id="badge" aria-hidden="true">
    <span class="dot"></span>
    <span class="txt">CloudSpace</span>
    <span class="txt sub">演示动画参考</span>
  </div>

  <div class="hint" id="hint" aria-hidden="true"><span class="k"></span>凝视她的右眼</div>

  <div class="gate" id="gate" role="dialog" aria-label="访问口令">
    <p class="gate-label">Access Key</p>
    <form id="gateForm" autocomplete="off">
      <input id="pw" type="password" placeholder="访问口令" autocomplete="current-password" aria-label="访问口令" />
      <button class="key" type="submit" aria-label="进入">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <circle cx="5" cy="5.5" r="3.2" stroke="rgba(232,127,160,0.85)" stroke-width="1.2" />
          <line x1="7.6" y1="7.6" x2="12" y2="12" stroke="rgba(232,127,160,0.85)" stroke-width="1.2" stroke-linecap="round" />
          <line x1="10" y1="10.8" x2="10" y2="12.4" stroke="rgba(232,127,160,0.85)" stroke-width="1.2" stroke-linecap="round" />
          <line x1="11.6" y1="10" x2="13.2" y2="10" stroke="rgba(232,127,160,0.85)" stroke-width="1.2" stroke-linecap="round" />
        </svg>
      </button>
    </form>
    <p class="gate-err" id="err"></p>
  </div>

  <script src="/gate/cover.js"></script>
  <script>
  (function () {
    "use strict";
    var DEBUG = /[?&]debug=1/.test(location.search);

    var canvas = document.getElementById("stage");
    var ctx = canvas.getContext("2d");
    var badge = document.getElementById("badge");
    var hint = document.getElementById("hint");
    var gate = document.getElementById("gate");
    var form = document.getElementById("gateForm");
    var pw = document.getElementById("pw");
    var err = document.getElementById("err");

    // ── Calibrated to cover.jpg (1600x800). Normalised image coords. ──
    var LOGIN_EYE = { x: 0.464, y: 0.384 };  // character's RIGHT eye (viewer-left) — hidden login
    var OTHER_EYE = { x: 0.606, y: 0.377 };  // character's left eye (viewer-right)
    var SEED      = { x: 0.523, y: 0.500 };  // growth origin

    // Growth tendrils (seed -> outward). cubic bezier in normalised image coords.
    var PATHS = [
      { p: [0.523,0.500, 0.42,0.28, 0.22,0.10, 0.06,0.18], c: "122,212,232", d: 0.00, w: 2.4 },
      { p: [0.523,0.500, 0.64,0.26, 0.82,0.08, 0.96,0.18], c: "122,212,232", d: 0.03, w: 2.4 },
      { p: [0.523,0.500, 0.38,0.30, 0.16,0.20, 0.02,0.42], c: "157,232,245", d: 0.06, w: 1.5 },
      { p: [0.523,0.500, 0.66,0.30, 0.86,0.20, 0.99,0.42], c: "157,232,245", d: 0.08, w: 1.5 },
      { p: [0.523,0.500, 0.46,0.24, 0.40,0.06, 0.36,-0.05], c: "122,212,232", d: 0.12, w: 1.2 },
      { p: [0.523,0.500, 0.58,0.24, 0.64,0.06, 0.70,-0.05], c: "122,212,232", d: 0.14, w: 1.2 },
      { p: [0.523,0.500, 0.45,0.45, 0.41,0.35, 0.47,0.27], c: "232,127,160", d: 0.20, w: 1.3 },
      { p: [0.523,0.500, 0.60,0.45, 0.64,0.35, 0.58,0.27], c: "232,127,160", d: 0.22, w: 1.3 },
      { p: [0.523,0.500, 0.40,0.70, 0.28,0.86, 0.22,1.04], c: "232,127,160", d: 0.26, w: 1.4 },
      { p: [0.523,0.500, 0.66,0.70, 0.80,0.86, 0.88,1.04], c: "232,127,160", d: 0.26, w: 1.4 }
    ];
    var HAIR_IDLE = [
      { p: [0.523,0.500, 0.42,0.28, 0.22,0.10, 0.06,0.18], ph: 0.0, amp: 0.012 },
      { p: [0.523,0.500, 0.64,0.26, 0.82,0.08, 0.96,0.18], ph: 1.2, amp: 0.011 },
      { p: [0.523,0.500, 0.38,0.30, 0.16,0.20, 0.02,0.42], ph: 2.1, amp: 0.016 },
      { p: [0.523,0.500, 0.66,0.30, 0.86,0.20, 0.99,0.42], ph: 0.7, amp: 0.016 }
    ];

    var img = new Image();
    var imgReady = false;
    img.onload = function () { imgReady = true; };
    img.src = (window.__COVER_SRC || "/gate/cover.jpg");

    var W = 0, H = 0, DPR = 1;
    function resize() {
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      W = window.innerWidth; H = window.innerHeight;
      canvas.width = W * DPR; canvas.height = H * DPR;
      canvas.style.width = W + "px"; canvas.style.height = H + "px";
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    window.addEventListener("resize", resize);
    resize();

    // cover-fit transform for the image onto the viewport
    function fit() {
      var iw = img.naturalWidth || 1600, ih = img.naturalHeight || 800;
      var s = Math.max(W / iw, H / ih);
      var dw = iw * s, dh = ih * s;
      return { s: s, dw: dw, dh: dh, dx: (W - dw) / 2, dy: (H - dh) / 2, iw: iw, ih: ih };
    }
    function toScreen(n) {
      var f = fit();
      return { x: f.dx + n.x * f.dw, y: f.dy + n.y * f.dh };
    }

    function cubic(p, t) {
      var m = 1 - t;
      return {
        x: m*m*m*p[0] + 3*m*m*t*p[2] + 3*m*t*t*p[4] + t*t*t*p[6],
        y: m*m*m*p[1] + 3*m*m*t*p[3] + 3*m*t*t*p[5] + t*t*t*p[7]
      };
    }
    function easeOut(t) { return 1 - Math.pow(1 - t, 3); }
    function easeIO(t) { return t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t; }

    // draw a bezier (normalised image coords) up to progress, in screen space
    function drawPath(p, progress, rgb, lw, alpha) {
      if (progress <= 0 || alpha <= 0) return;
      var f = fit();
      function C(nx, ny) { return { x: f.dx + nx * f.dw, y: f.dy + ny * f.dh }; }
      var pts = [C(p[0],p[1]), C(p[2],p[3]), C(p[4],p[5]), C(p[6],p[7])];
      var sp = [pts[0].x,pts[0].y, pts[1].x,pts[1].y, pts[2].x,pts[2].y, pts[3].x,pts[3].y];
      var steps = Math.max(2, Math.ceil(progress * 60));
      ctx.beginPath();
      ctx.moveTo(sp[0], sp[1]);
      for (var i = 1; i <= steps; i++) {
        var t = Math.min(progress, i / 60);
        var q = cubic(sp, t);
        ctx.lineTo(q.x, q.y);
      }
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = "rgba(" + rgb + ",1)";
      ctx.lineWidth = lw; ctx.lineCap = "round"; ctx.lineJoin = "round";
      ctx.shadowColor = "rgba(" + rgb + ",0.9)"; ctx.shadowBlur = 13;
      ctx.stroke();
      ctx.shadowBlur = 0; ctx.globalAlpha = 1;
    }

    // particles
    var parts = [];
    function spawn(cx, cy, burst) {
      var n = burst ? 14 : 1;
      for (var i = 0; i < n; i++) {
        var a = Math.random() * Math.PI * 2;
        var sp = burst ? 1.5 + Math.random()*3 : 0.3 + Math.random()*1.2;
        parts.push({
          x: cx + (Math.random()-0.5)*(burst?60:20),
          y: cy + (Math.random()-0.5)*(burst?60:20),
          vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - (burst?1.5:0.4),
          r: 1 + Math.random()*(burst?2.5:1.5), a: 0.85 + Math.random()*0.15,
          c: Math.random() > 0.5 ? "122,212,232" : "232,127,160"
        });
      }
    }

    // ── state ──
    var phase = "seed";           // seed -> grow -> flood -> idle
    var t0 = 0, pStart = 0;
    var mouse = { x: -9999, y: -9999 };
    var eyeHover = false;
    var floodBurst = false;
    var revealed = false;         // login panel shown
    var badgeShown = false, hintShown = false;
    var lastSpawn = 0;

    window.addEventListener("mousemove", function (e) {
      mouse.x = e.clientX; mouse.y = e.clientY;
      if (phase === "idle" && !revealed) {
        var ep = toScreen(LOGIN_EYE);
        var hot = Math.hypot(e.clientX - ep.x, e.clientY - ep.y) < eyeRadius();
        eyeHover = hot;
        canvas.style.cursor = hot ? "pointer" : "default";
      }
    });

    function eyeRadius() { return Math.max(26, fit().s * 1600 * 0.028); }

    function openGate() {
      if (revealed) return;
      revealed = true; eyeHover = false; canvas.style.cursor = "default";
      var ep = toScreen(LOGIN_EYE);
      // anchor panel near the eye, clamped to viewport
      var gx = Math.min(Math.max(ep.x, 180), W - 180);
      var gy = Math.min(Math.max(ep.y + 96, 140), H - 120);
      if (W < 560) { gx = W / 2; gy = H / 2; }
      gate.style.left = gx + "px";
      gate.style.top = gy + "px";
      gate.classList.add("open");
      hint.classList.remove("show");
      setTimeout(function () { pw.focus(); }, 120);
    }

    canvas.addEventListener("click", function (e) {
      if (phase !== "idle" || revealed) return;
      var ep = toScreen(LOGIN_EYE);
      if (Math.hypot(e.clientX - ep.x, e.clientY - ep.y) < eyeRadius()) openGate();
    });

    // ── login submit ──
    form.addEventListener("submit", function (e) {
      e.preventDefault();
      var code = pw.value.trim();
      if (!code) { fail("请输入访问口令"); return; }
      err.textContent = "";
      fetch("/api/gate/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "same-origin",
        body: JSON.stringify({ password: code })
      }).then(function (r) {
        if (r.ok) {
          gate.classList.add("gate-ok");
          err.textContent = "正在进入…";
          canvas.style.transition = "opacity 0.6s ease";
          canvas.style.opacity = "0";
          var gr = document.querySelector(".grain"); if (gr) gr.style.opacity = "0";
          setTimeout(function () { window.location.replace("/"); }, 640);
        } else { fail("口令无效"); }
      }).catch(function () { fail("网络异常"); });
    });

    function fail(msg) {
      err.textContent = msg;
      gate.classList.remove("shake"); void gate.offsetWidth; gate.classList.add("shake");
      pw.value = ""; pw.focus();
    }

    // ── render loop ──
    function frame(ts) {
      requestAnimationFrame(frame);
      if (!t0) { t0 = ts; pStart = ts; }
      var elapsed = ts - pStart;
      var f = fit();

      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = "#0d0e1a";
      ctx.fillRect(0, 0, W, H);

      // SEED (0-600ms)
      if (phase === "seed") {
        var t = Math.min(elapsed / 600, 1);
        var c = toScreen(SEED);
        var r = 3 + easeOut(t) * 9;
        var g = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, r * 3);
        g.addColorStop(0, "rgba(255,240,255," + (0.7*t) + ")");
        g.addColorStop(0.4, "rgba(122,212,232," + (0.4*t) + ")");
        g.addColorStop(1, "rgba(122,212,232,0)");
        ctx.beginPath(); ctx.arc(c.x, c.y, r*3, 0, 7); ctx.fillStyle = g; ctx.fill();
        ctx.beginPath(); ctx.arc(c.x, c.y, r, 0, 7);
        ctx.fillStyle = "rgba(230,250,255," + (0.95*t) + ")";
        ctx.shadowColor = "#7ad4e8"; ctx.shadowBlur = 24*t; ctx.fill(); ctx.shadowBlur = 0;
        if (t >= 1) { phase = "grow"; pStart = ts; }
      }

      // GROW (600-3000ms)
      if (phase === "grow") {
        var tg = Math.min(elapsed / 2400, 1);
        var pt = easeIO(tg);
        var sc = toScreen(SEED);
        var pulse = 0.3 + 0.15 * Math.sin(ts / 200);
        ctx.beginPath(); ctx.arc(sc.x, sc.y, 5, 0, 7);
        ctx.fillStyle = "rgba(200,240,255," + pulse + ")";
        ctx.shadowColor = "#7ad4e8"; ctx.shadowBlur = 10; ctx.fill(); ctx.shadowBlur = 0;
        for (var i = 0; i < PATHS.length; i++) {
          var P = PATHS[i];
          var lt = Math.max(0, (pt - P.d) / (1 - P.d));
          drawPath(P.p, easeOut(Math.min(lt * 1.3, 1)), P.c, P.w, 1);
        }
        if (tg > 0.45 && ts - lastSpawn > 100) { spawn(sc.x, sc.y, false); lastSpawn = ts; }
        if (tg >= 1) { phase = "flood"; pStart = ts; floodBurst = false; }
      }

      // FLOOD (1400ms)
      if (phase === "flood") {
        var ft = Math.min(elapsed / 1400, 1);
        var fe = easeOut(ft);
        if (imgReady) {
          var sc2 = toScreen(SEED);
          var maxR = Math.hypot(W, H) * 0.66;
          ctx.save();
          ctx.beginPath(); ctx.arc(sc2.x, sc2.y, fe * maxR, 0, 7); ctx.clip();
          ctx.drawImage(img, f.dx, f.dy, f.dw, f.dh);
          ctx.restore();
        }
        var pa = (1 - easeOut(ft)) * 0.6;
        if (pa > 0.02) for (var j = 0; j < PATHS.length; j++) drawPath(PATHS[j].p, 1, PATHS[j].c, PATHS[j].w, pa);
        if (!floodBurst && ft > 0.05) { var sb = toScreen(SEED); spawn(sb.x, sb.y, true); floodBurst = true; }
        if (ft >= 1) { phase = "idle"; pStart = ts; if (!badgeShown) { badge.classList.add("show"); badgeShown = true; } }
      }

      // IDLE (loop)
      if (phase === "idle") {
        if (imgReady) ctx.drawImage(img, f.dx, f.dy, f.dw, f.dh);

        // vignette
        var vig = ctx.createRadialGradient(W/2, H/2, H*0.28, W/2, H/2, H*0.95);
        vig.addColorStop(0, "rgba(0,0,0,0)");
        vig.addColorStop(1, "rgba(8,4,20,0.55)");
        ctx.fillStyle = vig; ctx.fillRect(0, 0, W, H);

        var tsec = ts / 1000;
        // animated hair wisps
        for (var h = 0; h < HAIR_IDLE.length; h++) {
          var hr = HAIR_IDLE[h];
          var wo1 = Math.sin(tsec * 0.85 + hr.ph) * hr.amp;
          var wo2 = Math.sin(tsec * 0.65 + hr.ph + 1.1) * hr.amp * 0.7;
          var pp = hr.p.slice();
          pp[2] += wo1; pp[3] += wo2; pp[4] += wo2; pp[5] += wo1;
          drawPath(pp, 1, "122,212,232", 1.8, 0.22);
        }

        // eye tracking (both eyes)
        var eyes = [LOGIN_EYE, OTHER_EYE];
        for (var e2 = 0; e2 < 2; e2++) {
          var ec = toScreen(eyes[e2]);
          var dist = Math.hypot(mouse.x - ec.x, mouse.y - ec.y);
          var ang = Math.atan2(mouse.y - ec.y, mouse.x - ec.x);
          var off = Math.min(dist / 180, 1) * 4.5;
          var ex = ec.x + Math.cos(ang) * off, ey = ec.y + Math.sin(ang) * off;
          var ig = ctx.createRadialGradient(ec.x, ec.y, 0, ec.x, ec.y, 14);
          ig.addColorStop(0, "rgba(122,212,232,0.20)");
          ig.addColorStop(1, "rgba(122,212,232,0)");
          ctx.beginPath(); ctx.arc(ec.x, ec.y, 14, 0, 7); ctx.fillStyle = ig; ctx.fill();
          ctx.beginPath(); ctx.arc(ex, ey, 4, 0, 7); ctx.fillStyle = "rgba(8,8,24,0.45)"; ctx.fill();
          ctx.beginPath(); ctx.arc(ex - 1.4, ey - 1.4, 1.3, 0, 7); ctx.fillStyle = "rgba(255,255,255,0.6)"; ctx.fill();
        }

        // login-eye keyhole pulse
        if (!revealed) {
          var le = toScreen(LOGIN_EYE);
          var mag = eyeHover ? 0.24 + 0.08*Math.sin(ts/300) : 0.08 + 0.05*Math.sin(ts/900);
          var kr = eyeHover ? 30 : 20;
          var kg = ctx.createRadialGradient(le.x, le.y, 0, le.x, le.y, kr);
          kg.addColorStop(0, "rgba(122,212,232," + mag + ")");
          kg.addColorStop(0.5, "rgba(122,212,232," + (mag*0.4) + ")");
          kg.addColorStop(1, "rgba(122,212,232,0)");
          ctx.beginPath(); ctx.arc(le.x, le.y, kr, 0, 7); ctx.fillStyle = kg; ctx.fill();
          if (eyeHover) {
            ctx.beginPath(); ctx.arc(le.x, le.y, kr*0.5, 0, 7);
            ctx.strokeStyle = "rgba(122,212,232,0.5)"; ctx.lineWidth = 1; ctx.stroke();
          }
        }

        if (ts - lastSpawn > 460) {
          spawn(f.dx + (0.15 + Math.random()*0.7)*f.dw, f.dy + (0.05 + Math.random()*0.75)*f.dh, false);
          lastSpawn = ts;
        }

        if (!hintShown && ts - t0 > 4200) { hint.classList.add("show"); hintShown = true; }
      }

      // particles (all phases)
      for (var k = parts.length - 1; k >= 0; k--) {
        var p = parts[k];
        p.x += p.vx; p.y += p.vy; p.vy += 0.02; p.a -= 0.009;
        if (p.a <= 0) { parts.splice(k, 1); continue; }
        ctx.globalAlpha = p.a;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 7);
        ctx.fillStyle = "rgba(" + p.c + ",1)";
        ctx.shadowColor = "rgba(" + p.c + ",1)"; ctx.shadowBlur = 8; ctx.fill(); ctx.shadowBlur = 0;
      }
      ctx.globalAlpha = 1;
      window.__phase = phase;

      // DEBUG: mark eye/seed positions for calibration
      if (DEBUG && phase === "idle") {
        [["LOGIN", LOGIN_EYE, "#e87fa0"], ["OTHER", OTHER_EYE, "#7ad4e8"], ["SEED", SEED, "#ffffff"]].forEach(function (m) {
          var s = toScreen(m[1]);
          ctx.strokeStyle = m[2]; ctx.lineWidth = 1.5;
          ctx.beginPath(); ctx.moveTo(s.x-12, s.y); ctx.lineTo(s.x+12, s.y);
          ctx.moveTo(s.x, s.y-12); ctx.lineTo(s.x, s.y+12); ctx.stroke();
          ctx.beginPath(); ctx.arc(s.x, s.y, eyeRadius(), 0, 7); ctx.globalAlpha = 0.5; ctx.stroke(); ctx.globalAlpha = 1;
          ctx.fillStyle = m[2]; ctx.font = "10px monospace"; ctx.fillText(m[0] + " " + m[1].x + "," + m[1].y, s.x + 14, s.y - 6);
        });
      }
    }
    requestAnimationFrame(frame);
  })();
  </script>
</body>
</html>
