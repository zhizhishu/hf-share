<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#0d0e1a" />
  <title>FusionSearch · Access</title>
  <style>
    /* 自托管 Space Grotesk（国内被墙，绝不外链 Google Fonts —— 否则渲染阻塞白屏） */
    @font-face { font-family: "Space Grotesk"; font-style: normal; font-weight: 300 700; font-display: swap; src: url("/entry/fonts/space-grotesk-latin.woff2") format("woff2"); }
    :root {
      --ink: #eef1ff;
      --pink: #e87fa0;
      --cyan: #7ad4e8;
      --bg: #0d0e1a;
      --font: "Space Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI",
        "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--bg); color: var(--ink);
      font-family: var(--font); -webkit-font-smoothing: antialiased;
      user-select: none; cursor: default;
    }
    /* growth video — the gun -> full character reveal */
    #growth {
      position: fixed; inset: 0; width: 100%; height: 100%;
      object-fit: cover; object-position: center; z-index: 0;
      background: var(--bg); pointer-events: none;
    }
    /* eye-glow / unlock overlay, matched to the video's cover-fit */
    #fx { position: fixed; inset: 0; display: block; z-index: 2; pointer-events: none; }

    /* film grain */
    .grain {
      position: fixed; inset: 0; pointer-events: none; z-index: 60; opacity: 0.05;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }

    /* corner badge */
    .badge {
      position: fixed; top: 24px; left: 28px; z-index: 40;
      display: flex; align-items: center; gap: 9px;
      opacity: 0; transition: opacity 1s ease;
    }
    .badge.show { opacity: 1; }
    .badge .dot {
      width: 5px; height: 5px; border-radius: 50%; background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
      animation: dotPulse 2s ease-in-out infinite;
    }
    .badge .txt {
      font-size: 9px; font-weight: 600; letter-spacing: 0.3em;
      text-transform: uppercase; color: rgba(238, 241, 255, 0.62);
    }
    .badge .sub { color: rgba(122, 212, 232, 0.5); font-weight: 500; }

    /* bottom hint */
    .hint {
      position: fixed; left: 0; right: 0; bottom: 30px; z-index: 40;
      text-align: center; font-size: 9.5px; font-weight: 400;
      letter-spacing: 0.34em; text-transform: uppercase;
      color: rgba(238, 241, 255, 0.36); pointer-events: none;
      opacity: 0; transition: opacity 1.2s ease;
    }
    .hint.show { opacity: 1; }
    .hint .k {
      display: inline-block; width: 4px; height: 4px; border-radius: 50%;
      background: var(--cyan); margin-right: 9px; vertical-align: middle;
      box-shadow: 0 0 6px var(--cyan);
      animation: blink 1.7s ease-in-out infinite;
    }

    /* access-key glass panel, anchored near the eyes */
    .gate {
      position: fixed; z-index: 50; left: 50%; top: 50%;
      transform: translate(-50%, -50%) scale(0.94);
      width: min(330px, 86vw); padding: 22px 24px 20px;
      background: rgba(13, 14, 26, 0.62);
      backdrop-filter: blur(26px) saturate(150%);
      -webkit-backdrop-filter: blur(26px) saturate(150%);
      border: 1px solid rgba(122, 212, 232, 0.26); border-radius: 9px;
      box-shadow: inset 0 1px 0 rgba(200, 240, 255, 0.08), 0 18px 60px rgba(0, 0, 0, 0.55),
        0 0 70px rgba(122, 212, 232, 0.1);
      display: none; flex-direction: column; align-items: center; gap: 14px;
      opacity: 0;
    }
    .gate.open { display: flex; animation: panelIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    .gate.shake { animation: shake 0.5s both; }
    .gate-label {
      font-size: 8px; font-weight: 600; letter-spacing: 0.38em;
      text-transform: uppercase; color: rgba(122, 212, 232, 0.7);
    }
    .gate form { display: flex; align-items: center; gap: 11px; }
    .gate input {
      width: 168px; padding: 9px 14px; text-align: center;
      background: rgba(255, 255, 255, 0.04); border: none;
      border-bottom: 1.5px solid rgba(122, 212, 232, 0.34);
      color: var(--ink); font-family: var(--font); font-size: 14px;
      letter-spacing: 0.28em; caret-color: var(--cyan); outline: none;
      transition: border-color 0.2s;
    }
    .gate input::placeholder { color: rgba(238, 241, 255, 0.3); letter-spacing: 0.2em; }
    .gate input:focus { border-bottom-color: rgba(122, 212, 232, 0.9); }
    .gate .key {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; flex-shrink: 0; background: transparent;
      border: 1px solid rgba(122, 212, 232, 0.34); border-radius: 50%;
      cursor: pointer; transition: background 0.2s, border-color 0.2s;
    }
    .gate .key:hover { background: rgba(122, 212, 232, 0.14); border-color: rgba(122, 212, 232, 0.75); }
    .gate-err {
      min-height: 11px; font-size: 8px; letter-spacing: 0.24em;
      text-transform: uppercase; color: rgba(232, 127, 160, 0.92);
    }
    .gate-ok .gate-err { color: rgba(122, 212, 232, 0.95); }

    @keyframes panelIn { from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
    @keyframes dotPulse { 0%, 100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.3); } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.15; } }
    @keyframes shake { 0%, 100% { transform: translate(-50%, -50%); } 20% { transform: translate(calc(-50% - 7px), -50%); } 40% { transform: translate(calc(-50% + 7px), -50%); } 60% { transform: translate(calc(-50% - 4px), -50%); } 80% { transform: translate(calc(-50% + 4px), -50%); } }

    @media (prefers-reduced-motion: reduce) {
      .badge .dot, .hint .k { animation: none; }
    }
  </style>
</head>
<body>
  <video id="growth" muted playsinline autoplay preload="auto" disablepictureinpicture aria-hidden="true"></video>
  <canvas id="fx"></canvas>
  <div class="grain" aria-hidden="true"></div>

  <div class="badge" id="badge" aria-hidden="true">
    <span class="dot"></span>
    <span class="txt">FusionSearch</span>
    <span class="txt sub">Access</span>
  </div>

  <div class="hint" id="hint" aria-hidden="true"><span class="k"></span>凝视她的双眸</div>

  <div class="gate" id="gate" role="dialog" aria-label="访问口令">
    <p class="gate-label">Access Key</p>
    <form id="gateForm" autocomplete="off">
      <input id="pw" type="password" placeholder="访问口令" autocomplete="current-password" aria-label="访问口令" />
      <button class="key" type="submit" aria-label="进入">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <circle cx="5" cy="5.5" r="3.2" stroke="rgba(122,212,232,0.9)" stroke-width="1.2" />
          <line x1="7.6" y1="7.6" x2="12" y2="12" stroke="rgba(122,212,232,0.9)" stroke-width="1.2" stroke-linecap="round" />
          <line x1="10" y1="10.8" x2="10" y2="12.4" stroke="rgba(122,212,232,0.9)" stroke-width="1.2" stroke-linecap="round" />
          <line x1="11.6" y1="10" x2="13.2" y2="10" stroke="rgba(122,212,232,0.9)" stroke-width="1.2" stroke-linecap="round" />
        </svg>
      </button>
    </form>
    <p class="gate-err" id="err"></p>
  </div>

  <script src="/gate/cover.js"></script>
  <script>
  (function () {
    "use strict";
    var qs = location.search;
    var DEBUG = /[?&]debug=1/.test(qs);
    var SKIPTO = (qs.match(/[?&]skipto=([a-z]+)/) || [])[1] || "";   // "ended" jumps to the unlock state
    var REDUCE = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    var video = document.getElementById("growth");
    var canvas = document.getElementById("fx");
    var ctx = canvas.getContext("2d");
    var badge = document.getElementById("badge");
    var hint = document.getElementById("hint");
    var gate = document.getElementById("gate");
    var form = document.getElementById("gateForm");
    var pw = document.getElementById("pw");
    var err = document.getElementById("err");

    // ── Eye calibration (normalised to the growth video's FINAL frame, 1592x896). ──
    // Jinx-cosplay character; both eyes sit on the viewer-left. The unlock hotspot
    // covers the eyes; clicking it opens the access panel.
    var EYE_L = { x: 0.356, y: 0.264 };   // her right eye (viewer-left)
    var EYE_R = { x: 0.390, y: 0.268 };   // her left eye (viewer-right)
    var EYE_MID = { x: (EYE_L.x + EYE_R.x) / 2, y: (EYE_L.y + EYE_R.y) / 2 };
    var VW = 1592, VH = 896;              // intrinsic video size (fallback)

    var CY = "122,212,232";   // cyan
    var MG = "232,127,160";   // magenta
    var WH = "240,250,255";   // white core

    var W = 0, H = 0, DPR = 1;
    function resize() {
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      W = window.innerWidth; H = window.innerHeight;
      canvas.width = W * DPR; canvas.height = H * DPR;
      canvas.style.width = W + "px"; canvas.style.height = H + "px";
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    window.addEventListener("resize", resize);
    resize();

    // cover-fit transform of the video frame onto the viewport (mirrors object-fit:cover)
    function fit() {
      var iw = video.videoWidth || VW, ih = video.videoHeight || VH;
      var s = Math.max(W / iw, H / ih);
      var dw = iw * s, dh = ih * s;
      return { s: s, dw: dw, dh: dh, dx: (W - dw) / 2, dy: (H - dh) / 2, iw: iw, ih: ih };
    }
    function toScreen(n) {
      var f = fit();
      return { x: f.dx + n.x * f.dw, y: f.dy + n.y * f.dh };
    }
    function eyeRadius() { return Math.max(40, fit().s * (video.videoWidth || VW) * 0.052); }

    function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

    function glowDisc(cx, cy, r, rgb, alpha) {
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      var g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
      g.addColorStop(0, "rgba(" + rgb + "," + alpha + ")");
      g.addColorStop(0.5, "rgba(" + rgb + "," + (alpha * 0.35) + ")");
      g.addColorStop(1, "rgba(" + rgb + ",0)");
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, 7); ctx.fillStyle = g; ctx.fill();
      ctx.restore();
      ctx.globalCompositeOperation = "source-over";
    }

    // glowing energy filament along a normalised cubic bezier (used for swaying hair wisps)
    function drawWisp(p, rgb, lw, alpha) {
      if (alpha <= 0) return;
      var f = fit();
      function sx(nx) { return f.dx + nx * f.dw; }
      function sy(ny) { return f.dy + ny * f.dh; }
      ctx.save(); ctx.globalCompositeOperation = "lighter";
      ctx.beginPath();
      ctx.moveTo(sx(p[0]), sy(p[1]));
      ctx.bezierCurveTo(sx(p[2]), sy(p[3]), sx(p[4]), sy(p[5]), sx(p[6]), sy(p[7]));
      ctx.strokeStyle = "rgba(" + rgb + "," + alpha + ")";
      ctx.lineWidth = lw; ctx.lineCap = "round";
      ctx.shadowColor = "rgba(" + rgb + ",0.85)"; ctx.shadowBlur = 10; ctx.stroke();
      ctx.restore(); ctx.globalCompositeOperation = "source-over";
    }

    // hair strands traced over the blue braids of the FINAL frame; they sway so the
    // frozen character keeps a living shimmer (normalised [x0,y0,c1x,c1y,c2x,c2y,x3,y3]).
    var WISPS = [
      { p: [0.31, 0.33, 0.20, 0.40, 0.11, 0.48, 0.05, 0.55], ph: 0.0, amp: 0.011 }, // upper left braid
      { p: [0.29, 0.38, 0.18, 0.45, 0.09, 0.51, 0.03, 0.56], ph: 1.3, amp: 0.010 }, // lower left braid
      { p: [0.335, 0.15, 0.318, 0.24, 0.318, 0.33, 0.328, 0.41], ph: 0.7, amp: 0.007 }, // face-framing strand
      { p: [0.42, 0.34, 0.50, 0.45, 0.52, 0.62, 0.47, 0.73], ph: 2.2, amp: 0.012 }  // big looping braid @ body
    ];

    // ── state ──
    var phase = "playing";         // playing -> ended (eyes unlock) -> revealed
    var t0 = 0, endedAt = 0;
    var mouse = { x: -9999, y: -9999 };
    var eyeHover = false;
    var revealed = false;
    var unlockT = 0;
    var badgeShown = false, hintShown = false;

    function enterEnded() {
      if (phase === "ended" || phase === "revealed") return;
      phase = "ended"; endedAt = performance.now();
      try { video.pause(); } catch (e) {}
      if (!badgeShown) { badge.classList.add("show"); badgeShown = true; }
    }

    // ── video lifecycle ──
    video.src = (window.__COVER_VIDEO || "/gate/growth.mp4");
    video.addEventListener("ended", enterEnded);
    // safety net: some engines don't fire "ended" reliably on non-looped data-URI video
    video.addEventListener("timeupdate", function () {
      if (video.duration && video.currentTime >= video.duration - 0.06) enterEnded();
    });
    video.addEventListener("loadedmetadata", function () {
      if (video.videoWidth) { VW = video.videoWidth; VH = video.videoHeight; }
      if (SKIPTO === "ended" || REDUCE) {
        try { video.currentTime = Math.max(0, (video.duration || 4) - 0.05); } catch (e) {}
        enterEnded();
      }
    });
    function tryPlay() {
      var p = video.play();
      if (p && p.catch) p.catch(function () { /* autoplay blocked: first frame stays, still interactive */ });
    }
    if (SKIPTO !== "ended" && !REDUCE) tryPlay(); else video.addEventListener("loadeddata", function () { try { video.pause(); } catch (e) {} });
    // hard fallback in case neither ended nor timeupdate ever lands
    setTimeout(function () { if (phase === "playing") enterEnded(); }, 9000);

    window.addEventListener("mousemove", function (e) {
      mouse.x = e.clientX; mouse.y = e.clientY;
      if (phase === "ended" && !revealed) {
        var ep = toScreen(EYE_MID);
        eyeHover = Math.hypot(e.clientX - ep.x, e.clientY - ep.y) < eyeRadius();
        document.body.style.cursor = eyeHover ? "pointer" : "default";
      }
    });

    function openGate() {
      if (revealed) return;
      revealed = true; phase = "revealed"; eyeHover = false; document.body.style.cursor = "default";
      unlockT = performance.now();
      var ep = toScreen(EYE_MID);
      var gx = Math.min(Math.max(ep.x, 180), W - 180);
      var gy = Math.min(Math.max(ep.y + 116, 150), H - 130);
      if (W < 560) { gx = W / 2; gy = H / 2; }
      gate.style.left = gx + "px";
      gate.style.top = gy + "px";
      gate.classList.add("open");
      hint.classList.remove("show");
      setTimeout(function () { pw.focus(); }, 120);
    }

    window.addEventListener("click", function (e) {
      if (phase !== "ended" || revealed) return;
      var ep = toScreen(EYE_MID);
      if (Math.hypot(e.clientX - ep.x, e.clientY - ep.y) < eyeRadius()) openGate();
    });

    // ── login submit (pipeline preserved verbatim) ──
    form.addEventListener("submit", function (e) {
      e.preventDefault();
      var code = pw.value.trim();
      if (!code) { fail("请输入访问口令"); return; }
      err.textContent = "";
      fetch("/api/admin/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "same-origin",
        body: JSON.stringify({ token: code })
      }).then(function (r) {
        if (r.ok) {
          gate.classList.add("gate-ok");
          err.textContent = "正在进入…";
          video.style.transition = "opacity 0.6s ease"; video.style.opacity = "0";
          canvas.style.transition = "opacity 0.6s ease"; canvas.style.opacity = "0";
          var gr = document.querySelector(".grain"); if (gr) gr.style.opacity = "0";
          // 在封面 iframe 浮层里 → 导航父窗口进 fusion 管理台;直接打开时 window.top===window 也成立。
          // claw 三合一里 fusion 挂在根(/admin 是设置台,/ 是海洋封面),别跳 /fusionsearch-mcp(404)。
          setTimeout(function () { (window.top || window).location.href = "/admin"; }, 640);
        } else { fail(r.status === 401 ? "口令无效" : "进入失败"); }
      }).catch(function () { fail("网络异常"); });
    });

    function fail(msg) {
      err.textContent = msg;
      gate.classList.remove("shake"); void gate.offsetWidth; gate.classList.add("shake");
      pw.value = ""; pw.focus();
    }

    // ── render loop (eye glow + unlock ripple; only active once the video ends) ──
    function frame(ts) {
      requestAnimationFrame(frame);
      if (!t0) t0 = ts;
      ctx.clearRect(0, 0, W, H);
      if (phase === "playing") { drawDebug(); return; }

      var tsec = ts / 1000;
      var mid = toScreen(EYE_MID);

      // ── living hair: energy filaments swaying along the braids of the frozen frame ──
      if (!REDUCE) {
        for (var wI = 0; wI < WISPS.length; wI++) {
          var hr = WISPS[wI];
          var o1 = Math.sin(tsec * 0.8 + hr.ph) * hr.amp;
          var o2 = Math.sin(tsec * 0.6 + hr.ph + 1.1) * hr.amp * 0.7;
          var pp = hr.p.slice();
          pp[2] += o1; pp[3] += o2; pp[4] += o2; pp[5] += o1;   // sway the bezier control points
          drawWisp(pp, CY, 1.6, 0.14 + 0.05 * Math.sin(tsec * 1.3 + hr.ph));
        }
      }

      // ── living eyes: breath glow + parallax catch-light + alternating twinkle ──
      var breath = 0.16 + 0.08 * Math.sin(ts / 760);
      var base = breath + (eyeHover ? 0.18 : 0);
      var rEye = eyeRadius() * (eyeHover ? 0.62 : 0.5);
      var eyeList = [EYE_L, EYE_R];
      for (var ei = 0; ei < 2; ei++) {
        var ec = toScreen(eyeList[ei]);
        glowDisc(ec.x, ec.y, rEye, CY, base);
        if (eyeHover) glowDisc(ec.x, ec.y, rEye * 0.55, WH, 0.25);
        // specular highlight follows the mouse, with a gentle autonomous drift
        var ang = Math.atan2(mouse.y - ec.y, mouse.x - ec.x);
        var dist = Math.hypot(mouse.x - ec.x, mouse.y - ec.y);
        var off = Math.min(dist / 220, 1) * 4 + 1.4;
        var drift = REDUCE ? 0 : 0.8 * Math.sin(tsec * 0.7 + ei * 1.7);
        var gx = ec.x + Math.cos(ang) * off + drift, gy = ec.y + Math.sin(ang) * off + drift * 0.5;
        ctx.save(); ctx.globalCompositeOperation = "lighter";
        ctx.beginPath(); ctx.arc(gx - 0.7, gy - 0.7, 1.6, 0, 7);
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        ctx.shadowColor = "rgba(" + CY + ",0.9)"; ctx.shadowBlur = 6; ctx.fill();
        ctx.restore(); ctx.globalCompositeOperation = "source-over";
      }
      // alternating twinkle — a brief catch-light bloom on one eye every ~3.4s
      if (!REDUCE) {
        var cyc = 3.4, tw = (tsec % cyc) / cyc;
        if (tw < 0.16) {
          var twEye = toScreen((Math.floor(tsec / cyc) % 2) ? EYE_R : EYE_L);
          var k = Math.sin((tw / 0.16) * Math.PI);
          glowDisc(twEye.x, twEye.y, rEye * 0.7, WH, 0.45 * k);
        }
      }
      // a soft magenta bloom binding the two eyes
      glowDisc(mid.x, mid.y, eyeRadius() * (eyeHover ? 1.05 : 0.85), MG, (eyeHover ? 0.16 : 0.09));

      // hover ring around the eye pair
      if (eyeHover && !REDUCE) {
        ctx.save(); ctx.globalCompositeOperation = "lighter";
        ctx.beginPath(); ctx.arc(mid.x, mid.y, eyeRadius() * 0.96, 0, 7);
        ctx.strokeStyle = "rgba(" + CY + ",0.55)"; ctx.lineWidth = 1.3;
        ctx.shadowColor = "rgba(" + CY + ",0.8)"; ctx.shadowBlur = 8; ctx.stroke();
        ctx.restore(); ctx.globalCompositeOperation = "source-over";
      }

      // unlock ripple on click
      if (unlockT) {
        var ut = (ts - unlockT) / 720;
        if (ut <= 1) {
          ctx.save(); ctx.globalCompositeOperation = "lighter";
          for (var ri = 0; ri < 2; ri++) {
            var rt = ut - ri * 0.18; if (rt < 0) continue;
            var rad = easeOut(Math.min(rt, 1)) * eyeRadius() * 2.6;
            ctx.beginPath(); ctx.arc(mid.x, mid.y, rad, 0, 7);
            ctx.strokeStyle = "rgba(" + (ri ? MG : CY) + "," + (0.6 * (1 - rt)) + ")";
            ctx.lineWidth = 2.2; ctx.shadowColor = "rgba(" + CY + ",0.8)"; ctx.shadowBlur = 12; ctx.stroke();
          }
          ctx.shadowBlur = 0; ctx.restore(); ctx.globalCompositeOperation = "source-over";
        } else unlockT = 0;
      }

      if (!hintShown && !revealed && ts - endedAt > 900) { hint.classList.add("show"); hintShown = true; }
      window.__phase = phase;
      drawDebug();
    }

    function drawDebug() {
      if (!DEBUG) return;
      [["EYE_L", EYE_L, "#e87fa0"], ["EYE_R", EYE_R, "#7ad4e8"], ["MID", EYE_MID, "#ffffff"]].forEach(function (mk) {
        var s = toScreen(mk[1]);
        ctx.strokeStyle = mk[2]; ctx.lineWidth = 1.5; ctx.globalAlpha = 1;
        ctx.beginPath(); ctx.moveTo(s.x - 13, s.y); ctx.lineTo(s.x + 13, s.y);
        ctx.moveTo(s.x, s.y - 13); ctx.lineTo(s.x, s.y + 13); ctx.stroke();
        ctx.fillStyle = mk[2]; ctx.font = "10px monospace";
        ctx.fillText(mk[0] + " " + mk[1].x + "," + mk[1].y, s.x + 15, s.y - 7);
      });
      var m = toScreen(EYE_MID);
      ctx.beginPath(); ctx.arc(m.x, m.y, eyeRadius(), 0, 7);
      ctx.globalAlpha = 0.5; ctx.strokeStyle = "#ffffff"; ctx.stroke(); ctx.globalAlpha = 1;
    }
    requestAnimationFrame(frame);
  })();
  </script>
</body>
</html>
