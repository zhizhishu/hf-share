server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 ipv6=off valid=10s;

    client_max_body_size 16m;
    proxy_buffering off;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_read_timeout 300s;

    set $fusionsearch_app fusionsearch-mcp:1666;
    set $libresearch_app libresearch:8080;
    set $search2api_app search2api:8000;

    location = /admin {
        proxy_pass http://$fusionsearch_app;
    }

    location /admin/ {
        proxy_pass http://$fusionsearch_app;
    }

    location /api/ {
        proxy_pass http://$fusionsearch_app;
    }

    location = /mcp {
        proxy_pass http://$fusionsearch_app;
    }

    location /mcp/ {
        proxy_pass http://$fusionsearch_app;
    }

    location = /libresearch/mcp {
        proxy_pass http://$fusionsearch_app;
    }

    location /libresearch/mcp/ {
        proxy_pass http://$fusionsearch_app;
    }

    location = /fusion/mcp {
        proxy_pass http://$fusionsearch_app;
    }

    location /fusion/mcp/ {
        proxy_pass http://$fusionsearch_app;
    }

    location = /sse {
        proxy_pass http://$fusionsearch_app;
    }

    location = /messages {
        proxy_pass http://$fusionsearch_app;
    }

    location = /health {
        proxy_pass http://$fusionsearch_app;
    }

    location = /status {
        proxy_pass http://$fusionsearch_app;
    }

    location /search2api/ {
        rewrite ^/search2api/(.*)$ /$1 break;
        proxy_pass http://$search2api_app;
    }

    location = /search {
        proxy_pass http://$libresearch_app$request_uri;
    }

    location /search/ {
        rewrite ^/search/(.*)$ /$1 break;
        proxy_pass http://$libresearch_app;
    }

    location /static/ {
        proxy_pass http://$libresearch_app;
    }

    location / {
        proxy_pass http://$libresearch_app;
    }
}
