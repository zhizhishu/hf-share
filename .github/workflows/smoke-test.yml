name: Smoke Test (docker run 三入口)

# 云端冒烟测: 拉 GHCR 镜像在 CI 里真跑起来, 轮询三入口"真就绪"。
# 完全不碰 HF —— 上 HF 前先在干净 Linux 里验证镜像能起 + 路由通, 避免在 HF 反复试错触发 flag。
# 严格判据: 404/502/000 = 子服务未起或路由错, 不算就绪; 只认 200/301/302/303/401
# (真页面 / 封面锁屏 / 重定向 / 门要求)。轮询等真就绪, 失败时打印 curl -i + 容器日志诊断。
on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Pull GHCR image (public, 匿名可拉)
        run: docker pull ghcr.io/${{ github.repository }}:latest

      - name: Run container (三合一, MOUNT_MAIL/MOUNT_SUBSTORE=on, 不接 Supabase)
        run: |
          docker run -d --name claw \
            -p 3000:3000 \
            -e PORT=3000 \
            -e MOUNT_MAIL=on \
            -e MOUNT_SUBSTORE=on \
            -e HTTP_META_NODE_MAX_OLD_SPACE_SIZE=512 \
            -e CLOUDSPACE_CORE_NODE_MAX_OLD_SPACE_SIZE=512 \
            ghcr.io/${{ github.repository }}:latest
          echo "container started"

      - name: Probe 三入口 (严格判据, 轮询等真就绪 ~240s)
        run: |
          set +e
          BASE=http://127.0.0.1:3000
          # 就绪 = 真页面/封面/重定向/门要求; 404(路由未匹配/子服务未起) / 502(反代目标不可达)
          # / 000(连不上) 一律 NOT ready, 继续轮询。
          is_ready() { case "$1" in 200|301|302|303|401) return 0;; *) return 1;; esac; }
          ok_root=""; ok_email=""; ok_cloud=""; ok_fusion=""
          last_r=""; last_e=""; last_c=""; last_f=""
          for i in $(seq 1 80); do
            sleep 3
            if ! docker ps --format '{{.Names}}' | grep -q '^claw$'; then
              echo "::error::容器在第 ${i} 轮已退出 (镜像起不来)"
              docker inspect claw --format '退出码={{.State.ExitCode}}' 2>/dev/null
              docker logs claw 2>&1 | tail -120
              exit 1
            fi
            code_root=$(curl -s -o /tmp/root.html -w '%{http_code}' -H 'Accept: text/html' "$BASE/" 2>/dev/null)
            code_email=$(curl -s -o /dev/null -w '%{http_code}' "$BASE/clawemail/" 2>/dev/null)
            code_cloud=$(curl -s -o /dev/null -w '%{http_code}' "$BASE/cloudspace/" 2>/dev/null)
            code_fusion=$(curl -s -o /dev/null -w '%{http_code}' "$BASE/fusionsearch-mcp" 2>/dev/null)
            last_r=$code_root; last_e=$code_email; last_c=$code_cloud; last_f=$code_fusion
            echo "[${i}] / =${code_root}  /clawemail/ =${code_email}  /cloudspace/ =${code_cloud}  /fusionsearch-mcp =${code_fusion}"
            [ "$code_root" = "200" ] && ok_root=1
            is_ready "$code_email" && ok_email=1
            is_ready "$code_cloud" && ok_cloud=1
            is_ready "$code_fusion" && ok_fusion=1
            if [ -n "$ok_root" ] && [ -n "$ok_email" ] && [ -n "$ok_cloud" ] && [ -n "$ok_fusion" ]; then
              echo "✓✓ 三入口真就绪 (第 ${i} 轮)"
              break
            fi
          done
          echo "=================== 判定 ==================="
          echo "  / (海洋入口)            : ${ok_root:-FAIL} (末次码=${last_r})"
          echo "  /clawemail/ (邮箱)       : ${ok_email:-FAIL} (末次码=${last_e})"
          echo "  /cloudspace/ (订阅)      : ${ok_cloud:-FAIL} (末次码=${last_c})"
          echo "  /fusionsearch-mcp (搜索) : ${ok_fusion:-FAIL} (末次码=${last_f})"
          if [ -n "$ok_root" ] && [ -n "$ok_email" ] && [ -n "$ok_cloud" ] && [ -n "$ok_fusion" ]; then
            echo "=== / 海洋入口 响应首 300 字节 ==="
            head -c 300 /tmp/root.html 2>/dev/null; echo
            echo "::notice::✓ 三入口真就绪, 镜像可上 HF"
            exit 0
          fi
          echo "::error::✗ 有入口未就绪 —— 诊断如下"
          for p in /clawemail/ /cloudspace/ /fusionsearch-mcp; do
            echo "===== curl -i ${p} (末态响应头) ====="
            curl -s -i "$BASE$p" 2>&1 | head -18
          done
          echo "===== 完整容器日志 (tail 250) ====="
          docker logs claw 2>&1 | tail -250
          exit 1

      - name: Container logs (always)
        if: always()
        run: docker logs claw 2>&1 | tail -80 || true
